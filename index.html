<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Ra AGV Slider</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #eef2f5;
            touch-action: none; /* Prevent screen scrolling while sliding */
        }
        .slider-card {
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
        .title {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .value-display {
            font-size: 55px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums;
        }
        
        /* Custom UI for the slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 20px;
            border-radius: 10px;
            background: #bdc3c7;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2980b9;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(41, 128, 185, 0.4);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.15);
            background: #3498db;
        }
    </style>
</head>
<body>

    <div class="slider-card">
        <div class="title">Tiến / Lùi (V1)</div>
        <div class="value-display" id="valDisplay">1500</div>
        
        <input type="range" id="agvSlider" min="1000" max="2000" value="1500">
    </div>

    <script>
    const slider = document.getElementById("agvSlider");
    const display = document.getElementById("valDisplay");

    const TARGET_VPIN = 1; 

    slider.addEventListener("input", function() {
        let currentVal = parseInt(this.value);
        display.innerText = currentVal;
        sendToEra(TARGET_VPIN, currentVal);
    });

    slider.addEventListener("change", function() {
        this.value = 1500;
        display.innerText = 1500;
        sendToEra(TARGET_VPIN, 1500);
    });

    function sendToEra(vPin, value) {

        // 👇 log kiểm tra
        console.log("Send:", vPin, value);

        // 👇 gửi đúng format cho ERa (NHỚ bỏ stringify)
        window.parent.postMessage({
            type: "write",
            pin: vPin,
            value: value
        }, '*');
    }
</script>
</body>
</html>

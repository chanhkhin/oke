<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ra Joystick Controller</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            text-align: center; 
            width: 320px;
            border: 1px solid #333;
        }
        h2 { color: #00ffcc; font-size: 1.2rem; margin-bottom: 30px; }
        .value-display { 
            font-size: 3.5rem; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 20px;
            font-family: monospace;
        }
        input[type="range"] { 
            width: 100%; 
            height: 12px; 
            border-radius: 10px; 
            background: #333; 
            outline: none; 
            -webkit-appearance: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 30px; 
            height: 30px; 
            background: #00ffcc; 
            border-radius: 50%; 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }
        .hint { color: #888; font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>JOYSTICK V1</h2>
        <div class="value-display" id="label">1500</div>
        <input type="range" id="joystick" min="1000" max="2000" value="1500">
        <p class="hint">Kéo để điều khiển - Thả để về giữa</p>
    </div>

    <script src="script.js"></script>
</body>
</html>

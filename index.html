<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <title>Smart Home Dashboard - Joystick Integration</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
    <style>
        /* CSS bổ sung cho Joystick để khớp với giao diện của bạn */
        .joystick-widget {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .joystick-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffcc;
            margin: 10px 0;
        }
        .joystick-slider {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <i class="fas fa-home active"></i>
            <i class="fas fa-bed"></i>
            <i class="fas fa-couch"></i>
            <i class="fas fa-utensils"></i>
            <i class="fas fa-cogs"></i>
        </div>

        <div class="main-content">
            <div class="nav">
                <div>
                    <a class="active" href="#"> HOME </a>
                    <a href="#"> BEDROOM </a>
                    <a href="#"> LIVING ROOM </a>
                    <a href="#"> KITCHEN </a>
                </div>
            </div>

            <div class="widgets">
                <div class="widget joystick-widget">
                    <div class="title" style="color: white; margin-bottom: 10px;">Joystick Control</div>
                    <div class="joystick-value" id="joystickLabel">1500</div>
                    <div class="slider-container">
                        <input type="range" id="joystickSlider" class="joystick-slider" min="1000" max="2000" value="1500">
                    </div>
                    <p style="color: #888; font-size: 12px; margin-top: 10px;">Thả tay để về 1500</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>

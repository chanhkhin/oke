<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Slider V1</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        .slider-container { margin-top: 50px; }
        input[type="range"] { width: 300px; cursor: pointer; }
        .value-display { font-size: 24px; font-weight: bold; margin-top: 20px; color: #FF5500; }
    </style>
</head>
<body>
    <h2>Điều khiển Slider V1 (Kiểu Joystick)</h2>
    
    <div class="slider-container">
        <input type="range" id="mySlider" min="0" max="255" value="127">
        <div class="value-display">Giá trị: <span id="sliderValue">127</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

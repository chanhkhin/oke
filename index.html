<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ra Joystick 1000-2000</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; background: #121212; color: white; }
        .slider-container { margin-top: 50px; }
        input[type="range"] { width: 300px; height: 15px; cursor: pointer; }
        .value-display { font-size: 32px; font-weight: bold; margin-top: 20px; color: #00ffcc; }
    </style>
</head>
<body>
    <h2>Joystick Control (V1)</h2>
    
    <div class="slider-container">
        <input type="range" id="mySlider" min="1000" max="2000" value="1500">
        <div class="value-display">Giá trị: <span id="sliderValue">1500</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

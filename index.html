<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>E-Ra Servo Control</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        .value-display { font-size: 48px; font-weight: bold; color: #00ffcc; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        input[type="range"] { width: 100%; height: 10px; border-radius: 5px; background: #444; outline: none; -webkit-appearance: none; margin: 20px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; background: #00ffcc; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        button { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Control Signal (V1)</h3>
        <div class="value-display" id="valLabel">1500</div>
        <input type="range" id="signalSlider" min="1000" max="2000" value="1500">
        <br>
        <button onclick="resetToCenter()">Reset to Center (1500)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

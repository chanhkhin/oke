<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGV Smart Control</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #121212; color: white; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        .header { text-align: center; padding: 15px; color: #00ffcc; font-weight: bold; font-size: 20px;}
        
        .mode-container { display: flex; justify-content: center; gap: 15px; padding: 10px; }
        .btn-mode {
            padding: 12px 20px; font-size: 13px; font-weight: bold; border: none; border-radius: 8px;
            cursor: pointer; background: #333; color: white; transition: 0.3s; flex: 1; max-width: 120px;
        }
        .btn-mode.active-manual { background: #FF5500; }
        .btn-mode.active-auto { background: #00ffcc; color: black; }

        /* Panel AUTO */
        .auto-panel {
            display: none; flex-direction: column; padding: 15px; background: #1e1e1e;
            margin: 0 15px 10px 15px; border-radius: 15px; border: 1px solid #333; flex: 1; overflow-y: auto;
        }
        .auto-panel.show { display: flex; }

        .section-title { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .uid-input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #2a2a2a; color: #00ffcc; font-size: 15px; outline: none;
        }
        .btn-add {
            background: #00ffcc; color: black; border: none; border-radius: 8px;
            padding: 0 20px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        .checkpoint-list { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 10px; margin-bottom: 15px; 
        }
        .point-card {
            background: #333; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #444;
        }
        .point-card .letter { font-size: 18px; font-weight: bold; color: #00ffcc; display: block; }
        .point-card .uid-label { font-size: 10px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .action-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-save { background: #28a745; color: white; }
        .btn-reset { background: #dc3545; color: white; }

        /* Phân cách */
        .divider { height: 1px; background: #444; margin: 10px 0 20px 0; position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #1e1e1e; padding: 0 10px; font-size: 12px; color: #888; font-weight: bold; }

        /* GOTO Section */
        .goto-list { display: flex; flex-direction: column; gap: 10px; }
        .btn-goto {
            background: #17a2b8; color: white; border: none; padding: 15px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .btn-goto:active { transform: scale(0.97); background: #138496; }
        .btn-goto span.uid-txt { font-size: 12px; opacity: 0.8; font-family: monospace; font-weight: normal; }
        .no-data-msg { text-align: center; color: #666; font-size: 13px; font-style: italic; }

        /* Panel MANUAL */
        .manual-panel { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .manual-panel.hidden { display: none; }
        .joy-box { background: #1e1e1e; padding: 15px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 42%; }
        .val-text { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #00ffcc; font-family: monospace; }
        .ctrl-btn {
            background: #444; border: 2px solid #555; color: white; font-size: 14px; font-weight: bold;
            border-radius: 12px; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ctrl-btn:active { background: #00ffcc; color: black; transform: scale(0.92); }
        .pad-horizontal { display: flex; gap: 10px; justify-content: center; }
        .pad-horizontal .ctrl-btn { width: 65px; height: 50px; }
        .pad-vertical { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .pad-vertical .ctrl-btn { width: 70px; height: 70px; }
    </style>
</head>
<body>

    <div class="header">AGV CONTROL CENTER</div>

    <div class="mode-container">
        <button id="btnManual" class="btn-mode active-manual">MANUAL</button>
        <button id="btnAuto" class="btn-mode">AUTO</button>
    </div>

    <div id="autoPanel" class="auto-panel">
        <div class="section-title">1. THIẾT LẬP LỘ TRÌNH</div>
        <div class="input-group">
            <input type="text" id="uidInput" class="uid-input" placeholder="Quét hoặc nhập UID..." readonly>
            <button id="btnAdd" class="btn-add">+</button>
        </div>

        <div id="checkpointList" class="checkpoint-list"></div>

        <div class="action-group">
            <button id="btnSave" class="btn-action btn-save">LƯU DỮ LIỆU</button>
            <button id="btnReset" class="btn-action btn-reset">RESET</button>
        </div>

        <div class="divider"><span>2. LỆNH ĐIỀU HƯỚNG GOTO</span></div>
        <div id="gotoList" class="goto-list"></div>
    </div>

    <div id="manualPanel" class="manual-panel">
        <div class="joy-box">
            <div class="val-text" id="labelLeft">1497</div>
            <div class="pad-horizontal">
                <button id="btnLeft" class="ctrl-btn">TRÁI</button>
                <button id="btnRight" class="ctrl-btn">PHẢI</button>
            </div>
        </div>

        <div class="joy-box">
            <div class="val-text" id="labelRight">1494</div>
            <div class="pad-vertical">
                <button id="btnUp" class="ctrl-btn">TIẾN</button>
                <button id="btnDown" class="ctrl-btn">LÙI</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
